[env:animation_demo]
platform = espressif32
board = esp32dev
framework = arduino

; Cấu hình Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Cấu hình upload
upload_speed = 921600

; Thư viện cho animation demo
lib_deps = 
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9

; Cấu hình build cho animation demo
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    
; Chỉ định file main cho animation demo
src_filter = 
    +<animations.cpp>
    +<animation_demo.cpp>
    -<main.cpp>

; Cấu hình partition
board_build.partitions = huge_app.csv